<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osobní Evidence Zásilek | New Technology Software</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 25px;
            box-sizing: border-box;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
        .header-item {
            display: flex;
            flex-direction: column;
        }
        .label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .value {
            font-size: 15px;
            color: #111827;
            font-weight: 500;
            word-break: break-word;
        }
        .value.large {
            font-size: 20px;
            font-weight: 700;
        }
        .row {
            margin-bottom: 15px;
        }
        .dobirka-box {
            background-color: #fee2e2;
            border: 1px solid #f87171;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .dobirka-box .label {
            color: #991b1b;
        }
        .dobirka-box .value {
            color: #991b1b;
            font-size: 24px;
            font-weight: bold;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: not-allowed;
            opacity: 0.5;
            text-align: center;
        }
        .btn-print { background-color: #e5e7eb; color: #374151; }
        .btn-share { background-color: #3b82f6; color: white; }
        
        /* Sekce s kroky od admina */
        .steps-container {
            margin-top: 30px;
            border-top: 2px dashed #e5e7eb;
            padding-top: 20px;
        }
        .step-item {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .step-icon {
            color: #10b981;
            font-size: 18px;
            font-weight: bold;
            margin-top: 2px;
        }
        .step-content {
            display: flex;
            flex-direction: column;
        }
        .step-title {
            color: #10b981;
            font-weight: bold;
            font-size: 14px;
        }
        .step-time {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <div class="header-item" style="flex: 1; padding-right: 10px;">
            <div class="label">Výdejní místo:</div>
            <div class="value" id="val-zpusob_dopravy">-</div>
        </div>
        <div class="header-item" style="flex: 1; text-align: right;">
            <div class="label">Přepravní společnost:</div>
            <div class="value large" id="val-dodavatel">-</div>
        </div>
    </div>

    <div class="row">
        <div class="label">Číslo zásilky:</div>
        <div class="value large" id="val-zasilka">-</div>
    </div>

    <div class="row">
        <div class="label">PIN pro vyzvednutí:</div>
        <div class="value large" style="letter-spacing: 2px; color: #374151;" id="val-pin">-</div>
    </div>

    <div class="row">
        <div class="label">Zásilka uložena na výdejním místě do:</div>
        <div class="value" id="val-datum_ulozeni">-</div>
    </div>

    <div class="row">
        <div class="label">Telefonní číslo na zásilce:</div>
        <div class="value" id="val-telefonni_cislo">-</div>
    </div>

    <div class="row">
        <div class="label">Příjemce:</div>
        <div class="value" id="val-prijemce">-</div>
    </div>

    <div class="row">
        <div class="label">Poznámka k zásilce:</div>
        <div class="value" id="val-interni_poznamka">-</div>
    </div>

    <div class="dobirka-box">
        <div class="label">Dobírka</div>
        <div class="value" id="val-dobirka">0 Kč</div>
    </div>

    <div class="buttons">
        <button class="btn btn-print" onclick="return false;">Vytisknout</button>
        <button class="btn btn-share" onclick="return false;">Uložit online a sdílet</button>
    </div>

    <div class="steps-container" id="steps-container">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDgcVbEFdYCkwbVCK0wTMxaKypaTi4EWj4",
        authDomain: "ppl-dobirka-zasilka.firebaseapp.com",
        databaseURL: "https://ppl-dobirka-zasilka-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "ppl-dobirka-zasilka",
        storageBucket: "ppl-dobirka-zasilka.firebasestorage.app",
        messagingSenderId: "649165034784",
        appId: "1:649165034784:web:83d318be85efd185743345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'zasilka_mironet');

    const fields = ['zpusob_dopravy', 'dodavatel', 'zasilka', 'pin', 'datum_ulozeni', 'telefonni_cislo', 'prijemce', 'interni_poznamka', 'dobirka'];
    
    const stepNames = {
        "step1": "Zásilka doručena",
        "step2": "Zásilka v pořádku zkontrolována, rozbalena a zboží je OK (žádná reklamace)",
        "step3": "Systém vytvořil automatický koncept platebního příkazu",
        "step4": "Platební příkaz schválen",
        "step5": "Platební příkaz s dobírkovou částkou byl odeslán (připsání na účet může trvat až 3 dny)",
        "step6": "Transakce dokončena"
    };

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Aktualizace textových polí
            fields.forEach(field => {
                const el = document.getElementById(`val-${field}`);
                if (el) {
                    if (field === 'datum_ulozeni' && data[field]) {
                        // Formátování data z YYYY-MM-DD na DD.MM.YYYY
                        const d = new Date(data[field]);
                        if(!isNaN(d.getTime())) {
                            el.innerText = `${d.getDate()}.${d.getMonth() + 1}.${d.getFullYear()}`;
                        } else {
                            el.innerText = data[field];
                        }
                    } else if (field === 'dobirka') {
                        el.innerText = data[field] ? `${data[field]} Kč` : '0 Kč';
                    } else {
                        el.innerText = data[field] || '-';
                    }
                }
            });

            // Aktualizace kroků
            const stepsContainer = document.getElementById('steps-container');
            stepsContainer.innerHTML = ''; // Vyčištění před novým renderem
            
            for (let i = 1; i <= 6; i++) {
                const stepKey = `step${i}`;
                if (data.steps && data.steps[stepKey]) {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'step-item';
                    stepDiv.innerHTML = `
                        <div class="step-icon">✓</div>
                        <div class="step-content">
                            <div class="step-title">${stepNames[stepKey]}</div>
                            <div class="step-time">${data.steps[stepKey]}</div>
                        </div>
                    `;
                    stepsContainer.appendChild(stepDiv);
                }
            }
        }
    });
</script>
</body>
</html>
